<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-label="Agentic AI Index — a curated, always-fresh map of the open-source agentic-AI ecosystem">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#111a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <style>
      .f { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .title { font-weight: 800; }
      .chip { font-weight: 600; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect width="1280" height="420" fill="url(#bg)"/>
  <rect width="1280" height="6" fill="url(#accent)"/>

  <!-- wordmark -->
  <text x="80" y="150" class="f title" font-size="72" fill="#f8fafc">🧭 Agentic AI Index</text>
  <text x="82" y="205" class="f" font-size="30" fill="#94a3b8">A curated, always-fresh map of the open-source agentic-AI ecosystem.</text>

  <!-- category chips -->
  <g class="f chip" font-size="20" fill="#cbd5e1">
    <g>
      <rect x="80"  y="250" rx="18" ry="18" width="200" height="40" fill="#1e293b" stroke="#334155"/>
      <text x="180" y="276" text-anchor="middle">Frameworks</text>
    </g>
    <g>
      <rect x="296" y="250" rx="18" ry="18" width="210" height="40" fill="#1e293b" stroke="#334155"/>
      <text x="401" y="276" text-anchor="middle">Coding agents</text>
    </g>
    <g>
      <rect x="522" y="250" rx="18" ry="18" width="150" height="40" fill="#1e293b" stroke="#334155"/>
      <text x="597" y="276" text-anchor="middle">Memory</text>
    </g>
    <g>
      <rect x="688" y="250" rx="18" ry="18" width="180" height="40" fill="#1e293b" stroke="#334155"/>
      <text x="778" y="276" text-anchor="middle">Tools &amp; MCP</text>
    </g>
    <g>
      <rect x="884" y="250" rx="18" ry="18" width="220" height="40" fill="#1e293b" stroke="#334155"/>
      <text x="994" y="276" text-anchor="middle">Observability</text>
    </g>
  </g>
  <g class="f chip" font-size="20" fill="#cbd5e1">
    <g>
      <rect x="80"  y="304" rx="18" ry="18" width="160" height="40" fill="#1e293b" stroke="#334155"/>
      <text x="160" y="330" text-anchor="middle">Security</text>
    </g>
    <g>
      <rect x="256" y="304" rx="18" ry="18" width="150" height="40" fill="#1e293b" stroke="#334155"/>
      <text x="331" y="330" text-anchor="middle">Voice</text>
    </g>
    <g>
      <rect x="422" y="304" rx="18" ry="18" width="140" height="40" fill="#1e293b" stroke="#334155"/>
      <text x="492" y="330" text-anchor="middle">RAG</text>
    </g>
    <g>
      <rect x="578" y="304" rx="18" ry="18" width="230" height="40" fill="#1e293b" stroke="#334155"/>
      <text x="693" y="330" text-anchor="middle">+ 6 more categories</text>
    </g>
  </g>

  <!-- auto-refresh badge -->
  <g transform="translate(80,372)">
    <circle cx="8" cy="-6" r="6" fill="#22c55e"/>
    <text x="24" y="0" class="f mono" font-size="18" fill="#94a3b8">self-refreshing · ranked by GitHub stars · never goes stale</text>
  </g>
</svg>
